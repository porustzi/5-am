[build]
  base = "project"
  publish = "dist"
  command = "npm run build"

# Правило редиректа для SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Отключение кэширования для JSON
[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "max-age=0, no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# MIME fix
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript"

[[headers]]
  for = "/*.mjs"
  [headers.values]
    Content-Type = "application/javascript"
