backend:
  name: git-gateway
  repo: platstarinum-prog/reseil-dalbayoba
  branch: main

media_folder: "project/public/images/uploads"
public_folder: "/images/uploads"
format: "json"

collections:
  # КАТАЛОГ — кожен товар окремий файл
  - name: "products"
    label: "Каталог"
    folder: "project/src/data/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Назва", name: "name", widget: "string" }
      - { label: "Бренд", name: "brand", widget: "string" }
      - { label: "Ціна (грн)", name: "price", widget: "number" }
      - { label: "Категорія", name: "category", widget: "select", options: ["Одяг", "Взуття", "Аксесуари"] }
      - { label: "Розмір", name: "sizes", widget: "string" }
      - { label: "Фото (URL)", name: "imageUrl", widget: "string" }
      - { label: "Telegram продавця", name: "seller_tg", widget: "string", default: "5am_store_official" }
      - { label: "Стан", name: "condition", widget: "select", options: ["Новий", "Відмінний", "Хороший", "Б/У"] }
      - { label: "Продано", name: "sold", widget: "boolean", default: false }

  # FAQ — кожне питання окремий файл
  - name: "faq"
    label: "FAQ"
    folder: "project/src/data/faq"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Питання", name: "question", widget: "string" }
      - { label: "Відповідь", name: "answer", widget: "text" }

  # ВІДГУКИ + ГОЛОВНА — файли
  - name: "settings"
    label: "Налаштування"
    files:
      - file: "project/src/data/reviews.json"
        label: "Відгуки"
        name: "reviews"
        fields:
          - name: "items"
            label: "Список відгуків"
            widget: "list"
            fields:
              - { label: "Ім'я автора", name: "author", widget: "string" }
              - { label: "Що купив", name: "item", widget: "string" }
              - { label: "Текст відгуку", name: "text", widget: "text" }

      - file: "project/src/data/home.json"
        label: "Головна сторінка"
        name: "home_page"
        fields:
          - { label: "Заголовок", name: "heroTitle", widget: "string" }
          - { label: "Підзаголовок", name: "heroSubtitle", widget: "text" }
          - { label: "Текст кнопки", name: "ctaText", widget: "string" }
