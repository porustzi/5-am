backend:
  name: git-gateway
  branch: main # Переименуй в master, если основная ветка репозитория называется так

local_backend: true # Позволяет тестировать админку локально через прокси-сервер

media_folder: "project/public/images/uploads"
public_folder: "/images/uploads"

# Формат сохранения файлов по умолчанию
format: "json"

collections:
  # 1. КОЛЛЕКЦИЯ ДЛЯ КАТАЛОГА ТОВАРОВ (ПОЛНЫЙ КОНТРОЛЬ)
  - name: "products"
    label: "Каталог товаров"
    folder: "project/src/data/live_products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "ID товара", name: "id", widget: "string" }
      - { label: "Название товара", name: "name", widget: "string" }
      - { label: "Бренд", name: "brand", widget: "string", default: "5AM" }
      - { label: "Цена", name: "price", widget: "number", value_type: "int" }
      - { label: "Изображение товара", name: "image", widget: "image" }
      - { label: "Размеры (строкой, например: S, M, L)", name: "sizes", widget: "string", default: "S, M, L, XL" }
      - { label: "Telegram продавца (можно с @ или без)", name: "seller_tg", widget: "string", default: "5am_store_official" }
      - { label: "Состояние вещи", name: "condition", widget: "string", default: "New", required: false }
      - { label: "Продано (Скрыть кнопку покупки)", name: "sold", widget: "boolean", default: false }

  # 2. ФАЙЛЫ ДЛЯ ОТЗЫВОВ, FAQ И ГЛАВНОЙ СТРАНИЦЫ
  - name: "data_lists"
    label: "Списки и настройки"
    files:
      - file: "project/src/data/home.json"
        label: "Главная страница (Тексты)"
        name: "home_page"
        fields:
          - { label: "Главный заголовок (Hero Title)", name: "heroTitle", widget: "string", default: "5AM STORE" }
          - { label: "Подзаголовок (Hero Subtitle)", name: "heroSubtitle", widget: "text", default: "Преміальний дроп та аксесуари. Оновлення каталогу щотижня." }
          - { label: "Текст кнопки (CTA Text)", name: "ctaText", widget: "string", default: "Перейти до каталогу" }

      - file: "project/src/data/reviews.json"
        label: "Отзывы клиентов"
        name: "reviews"
        fields:
          - name: "items"
            label: "Список отзывов"
            widget: "list"
            fields:
              - { label: "Имя автора", name: "author", widget: "string" }
              - { label: "Что купил (Вещь)", name: "item", widget: "string" }
              - { label: "Отзыв (Текст)", name: "text", widget: "text" }

      - file: "project/src/data/faq.json"
        label: "Часто задаваемые вопросы (FAQ)"
        name: "faq"
        fields:
          - name: "items"
            label: "Вопросы и ответы"
            widget: "list"
            fields:
              - { label: "Вопрос (RU)", name: "question_ru", widget: "string" }
              - { label: "Ответ (RU)", name: "answer_ru", widget: "text" }
              - { label: "Вопрос (UA/EN)", name: "question_en", widget: "string", required: false }
              - { label: "Ответ (UA/EN)", name: "answer_en", widget: "text", required: false }
